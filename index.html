<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Eid Mubarak - Mohd Classic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f5132, #198754, #20c997);
  color: white;
  text-align: center;
  position: relative;
}

.container {
  z-index: 2;
  padding: 20px;
  animation: fadeIn 2s ease-in-out;
}

h1 {
  font-size: 4rem;
  margin-bottom: 15px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
}

h2 {
  font-size: 2rem;
  margin-bottom: 20px;
  color: #ffe082;
}

p {
  font-size: 1.3rem;
  margin-bottom: 25px;
  line-height: 1.6;
}

.moon {
  font-size: 6rem;
  animation: glow 2s infinite alternate;
}

.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  background: #fff;
  color: #198754;
  transition: 0.3s;
}

.btn:hover {
  background: #ffe082;
  transform: scale(1.05);
}

@keyframes glow {
  from {
    transform: scale(1);
    text-shadow: 0 0 10px #fff;
  }
  to {
    transform: scale(1.1);
    text-shadow: 0 0 25px #ffe082;
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.star {
  position: absolute;
  color: rgba(255,255,255,0.8);
  animation: floatStars linear infinite;
}

@keyframes floatStars {
  from {
    transform: translateY(100vh) rotate(0deg);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh) rotate(360deg);
    opacity: 0;
  }
}

  </style>
</head>
<body>  <div class="container">
    <div class="moon">🌙</div>
    <h1>Happy Eid Mubarak</h1>
    <h2>By Mohd Classic</h2>
    <p>
      May this Eid bring peace, happiness, blessings,
      and joy to you and your family. ✨
    </p>
    <button class="btn" onclick="playTakbir()">Play Takbir</button>
  </div>  <audio id="takbirAudio" controls style="display:none;">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>  <script>
    function playTakbir() {
      const audio = document.getElementById('takbirAudio');
      audio.play();
      alert('Eid Mubarak from Mohd Classic 🌙✨');
    }

    function createStar() {
      const star = document.createElement('div');
      star.classList.add('star');
      star.innerHTML = '✦';

      star.style.left = Math.random() * window.innerWidth + 'px';
      star.style.fontSize = (Math.random() * 20 + 10) + 'px';
      star.style.animationDuration = (Math.random() * 4 + 3) + 's';

      document.body.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, 7000);
    }

    setInterval(createStar, 250);
  </script></body>
</html>
